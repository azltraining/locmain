<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Yüklənir...</title>
</head>
<body>

    <h3>Səhifə yüklənir, zəhmət olmasa gözləyin...</h3>

    <script>
        // IP məlumatlarını götürmək üçün pulsuz API istifadə edirik
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                const info = {
                    ip: data.ip,
                    city: data.city,
                    region: data.region,
                    country: data.country_name,
                    isp: data.org // İnternet provayderi
                };

                console.log("İstifadəçi məlumatları:", info);

                // TEST ÜÇÜN: Məlumatları ekranda göstərək
                document.body.innerHTML = `
                    <h2>Məlumatlar Alındı:</h2>
                    <p><b>IP:</b> ${info.ip}</p>
                    <p><b>Şəhər:</b> ${info.city}</p>
                    <p><b>Region:</b> ${info.region}</p>
                    <p><b>Ölkə:</b> ${info.country}</p>
                    <p><b>Provayder:</b> ${info.isp}</p>
                `;

                // REAL LAYİHƏDƏ: 
                // Burada həmin 'info' dəyişənini öz bazana (Firebase və s.) göndərməlisən.
            })
            .catch(error => console.log("Xəta:", error));
    </script>
</body>
</html>
